# FAQ: https://github.com/tmux/tmux/wiki/FAQ

# mouse mode to make tmux behaves more like regular app
set -g mouse on
setw -g mode-keys vi
# selection lingers: stops tmux from auto-closing the selection when you let go of the mouse
unbind -T copy-mode-vi MouseDragEnd1Pane
# double click should select word and lingers
unbind -T copy-mode-vi DoubleClick1Pane
bind-key -T copy-mode-vi DoubleClick1Pane select-pane \; send-keys -X select-word
# esc and single click to return to regular terminal input
bind-key -T copy-mode-vi Escape send-keys -X cancel
bind-key -T copy-mode-vi MouseDown1Pane select-pane \; send-keys -X clear-selection \; send-keys -X cancel
# enter to copy to mac clipboard (pbcopy) and closes the selection mode
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "pbcopy"


# enable color and true color
set -g default-terminal "xterm-256color"
set -ag terminal-overrides ",xterm*:RGB"

# start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1

# windows: (1 2 3 4), if you delete (2), (3 4) will become (2 3)
set -g renumber-windows on

# new window from current dir in the pane
bind c new-window -c "#{pane_current_path}"

# split pane from current dir in the pane, not from when tmux session created
unbind '"'
unbind %
bind - split-window -v -c "#{pane_current_path}"
bind \\ split-window -h -c "#{pane_current_path}"

# toggle readonly or not using L key
unbind l
bind-key l run-shell 'if [ #{pane_input_off} = "1" ]; then tmux select-pane -e; else tmux select-pane -d; fi'

# reload source
bind r source-file ~/.tmux.conf
